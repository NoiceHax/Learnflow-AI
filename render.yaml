# Render Blueprint — backend API only (frontend deploys to Vercel).
services:
  - type: web
    name: learnai-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    releaseCommand: python -m app.seed --if-empty
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://learnflow-ai-iota.vercel.app
      - key: CORS_ORIGINS
        sync: false
      - key: USE_AI
        value: "true"
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_API_KEYS
        sync: false
      - key: NVIDIA_MODELS
        sync: false
      - key: NVIDIA_THINKING
        value: "true"
      - key: PILOT_MODE
        value: "true"
      - key: PILOT_AI_QUESTIONS_PER_CHAPTER
        value: "35"
      - key: MIN_QUIZ_QUESTIONS
        value: "4"
      - key: NVIDIA_RPM_PER_KEY
        value: "35"
      - key: PRACTICE_LIVE_API_ON_LOAD
        value: "false"
