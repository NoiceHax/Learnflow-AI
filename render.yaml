# Render Blueprint — backend API only (frontend deploys to Vercel).
services:
  - type: web
    name: learnai-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    releaseCommand: python -m app.seed --if-empty
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: USE_GEMINI
        value: "true"
      - key: AI_PROVIDER
        value: nvidia
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODELS
        sync: false
      - key: NVIDIA_THINKING
        value: "true"
